name: Build client bundle

# Runs on every push to `main` that touches the React source, builds the app,
# and commits the resulting `client/build/` back to `main`. Hostinger's git
# auto-deploy then pulls the bot's commit and the live site updates — no
# manual `npm run build` step needed.

on:
  push:
    branches: [main]
    paths:
      - 'client/src/**'
      - 'client/public/**'
      - 'client/package.json'
      - 'client/package-lock.json'
      - 'client/tsconfig.json'
      - 'client/tailwind.config.js'
      - 'client/postcss.config.js'
      # Intentionally NOT triggering on `client/build/**` so the bot's own
      # commit (which only changes the build folder) never re-triggers us.
      - '.github/workflows/build-client.yml'
  # Allow firing manually from the Actions tab in the GitHub UI.
  workflow_dispatch: {}

# If a newer commit lands on `main` while a build is still running, cancel the
# stale build so we don't push an out-of-date bundle on top of the newer one.
concurrency:
  group: build-client-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    # The default GITHUB_TOKEN needs `contents: write` to be able to push the
    # rebuilt bundle back to main.
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN so the bot's push uses its identity.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build the React app
        working-directory: client
        # CRA treats CI=true as "warnings = errors", which has tripped builds
        # for benign unused-import / a11y lint warnings. Unset it so the build
        # succeeds the same way it does on a developer's machine.
        env:
          CI: ''
        run: npm run build

      - name: Commit build artifacts back to main
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add client/build
          if git diff --cached --quiet; then
            echo "Build folder unchanged — nothing to commit."
            exit 0
          fi
          # `[skip ci]` keeps the bot's own commit from re-triggering this
          # workflow (belt-and-braces: the path filter above already excludes
          # client/build/** from the push trigger).
          git commit -m "chore(build): rebuild client bundle [skip ci]"
          git push
